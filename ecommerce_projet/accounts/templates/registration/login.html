{% extends "products/layout.html" %}
{% block title %}
Connexion
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="auth-panel">
            <h2>Connexion</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">
                    Se connecter
                </button>
            </form>
            <p class="mt-3 mb-0">
                Vous n'avez pas encore de compte ?
                <a href="{% url 'signup' %}">Creer un compte</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

<h1>Catégories des produits</h1>
<ul>
    {% for category in categories %}
        <li>
            <h3><a href="{% url 'category_detail' category.id %}">{{ category.name }}</a></h3>
            <p>{{ category.description }}</p>
        </li>
    {% empty %}
        <li>Aucune catégorie disponible.</li>
    {% endfor %}
</ul>
<a href="{% url 'product_list' %}">Retour à la liste des produits</a>
